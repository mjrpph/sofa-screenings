<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Screenings 2026 — Review Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --text-dimmer: #454d66;
    --accent: #f5c842;
    --accent2: #e07b3f;
    --morning: #f5c842;
    --afternoon: #7c6ff7;
    --check-on: #4ade80;
    --thu: #3b82f6;
    --fri: #ec4899;
    --sat: #f97316;
    --sun: #a78bfa;
    --mon: #34d399;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
line-height: 1.4;
min-height: 100vh;
}

/* HEADER */
.site-header {
position: sticky;
top: 0;
z-index: 100;
background: rgba(13,15,20,0.95);
backdrop-filter: blur(12px);
border-bottom: 1px solid var(–border);
padding: 0 20px;
}

.header-inner {
max-width: 100%;
display: flex;
align-items: center;
gap: 20px;
height: 56px;
}

.site-title {
font-family: ‘DM Serif Display’, serif;
font-size: 20px;
color: var(–accent);
white-space: nowrap;
letter-spacing: -0.3px;
}

.site-title span {
color: var(–text-dim);
font-style: italic;
font-size: 14px;
margin-left: 6px;
}

.header-stats {
display: flex;
gap: 16px;
margin-left: auto;
align-items: center;
}

.stat {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: #ffffff;
}

.stat strong {
color: var(–accent);
font-size: 13px;
}

/* FILTERS */
.filters-bar {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 10px 20px;
display: flex;
gap: 12px;
align-items: center;
flex-wrap: wrap;
}

.filter-label {
font-size: 11px;
color: #ffffff;
text-transform: uppercase;
letter-spacing: 0.08em;
font-weight: 500;
}

.search-input {
background: var(–bg);
border: 1px solid var(–border);
color: var(–text);
padding: 5px 10px;
border-radius: 4px;
font-family: ‘DM Sans’, sans-serif;
font-size: 12px;
width: 200px;
outline: none;
transition: border-color 0.15s;
}
.search-input:focus { border-color: var(–accent); }
.search-input::placeholder { color: var(–text-dimmer); }

.day-filters {
display: flex;
gap: 6px;
}

.day-btn, .state-btn {
padding: 4px 10px;
border-radius: 4px;
border: 1px solid var(–border);
background: transparent;
color: #ffffff;
font-size: 11px;
font-weight: 500;
cursor: pointer;
transition: all 0.15s;
font-family: ‘DM Sans’, sans-serif;
letter-spacing: 0.03em;
}
.day-btn:hover { border-color: #ffffff; color: #ffffff; }
.state-btn:hover { border-color: #ffffff; color: #ffffff; }
.day-btn.active { background: var(–accent); border-color: var(–accent); color: #000; font-weight: 600; }
.state-btn.active { font-weight: 600; }
.state-btn[data-state=“all”].active    { background: #ffffff; border-color: #ffffff; color: #000; }
.state-btn[data-state=“0”].active      { background: var(–surface2); border-color: var(–text-dim); color: #ffffff; }
.state-btn[data-state=“1”].active      { background: #f5c842; border-color: #f5c842; color: #000; }
.state-btn[data-state=“2”].active      { background: #4ade80; border-color: #4ade80; color: #000; }
.state-btn[data-state=“3”].active      { background: #ef4444; border-color: #ef4444; color: #fff; }
.day-btn[data-day=“Thursday”].active { background: var(–thu); border-color: var(–thu); }
.day-btn[data-day=“Friday”].active { background: var(–fri); border-color: var(–fri); color: #fff; }
.day-btn[data-day=“Saturday”].active { background: var(–sat); border-color: var(–sat); }
.day-btn[data-day=“Sunday”].active { background: var(–sun); border-color: var(–sun); color: #fff; }
.day-btn[data-day=“Monday”].active { background: var(–mon); border-color: var(–mon); color: #000; }

.clear-btn {
margin-left: auto;
padding: 4px 12px;
border-radius: 4px;
border: 1px solid #3d2020;
background: transparent;
color: #e05050;
font-size: 11px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.15s;
}
.clear-btn:hover { background: #3d2020; }

/* TABLE WRAPPER */
.table-wrapper {
overflow-x: visible;
padding: 0;
}

body {
overflow-x: auto;
}

table {
width: 100%;
border-collapse: collapse;
min-width: 0;
}

/* STICKY HEADER */
thead {
position: sticky;
top: 56px;
z-index: 90;
}

thead tr:first-child th {
background: var(–surface2);
border-bottom: 2px solid var(–border);
padding: 10px 12px;
font-size: 10px;
font-weight: 600;
letter-spacing: 0.1em;
text-transform: uppercase;
color: #ffffff;
white-space: nowrap;
}

th.film-col { text-align: left; width: 34%; min-width: 260px; }
th.author-col { text-align: left; width: 14%; min-width: 120px; }
th.runtime-col { text-align: center; width: 7%; min-width: 70px; }
th.reviewer-col { text-align: center; width: 9%; min-width: 80px; }

.reviewer-header {
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
cursor: pointer;
user-select: none;
}

.reviewer-initials {
width: 28px; height: 28px;
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 11px;
font-weight: 700;
letter-spacing: 0;
font-family: ‘DM Mono’, monospace;
}

.reviewer-name-short {
font-size: 9px;
color: #ffffff;
font-weight: 500;
letter-spacing: 0.05em;
}

/* DAY SECTION HEADER */
tr.day-row.hidden { display: none; }

.day-row td {
padding: 18px 16px 12px;
font-family: ‘DM Serif Display’, serif;
font-size: 22px;
color: #ffffff;
border-top: 3px solid var(–border);
border-bottom: 1px solid var(–border);
background: #252a3a;
position: relative;
letter-spacing: -0.2px;
}

.day-row td::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 3px;
}

.day-row[data-day=“Thursday”] td::before { background: var(–thu); }
.day-row[data-day=“Friday”] td::before { background: var(–fri); }
.day-row[data-day=“Saturday”] td::before { background: var(–sat); }
.day-row[data-day=“Sunday”] td::before { background: var(–sun); }
.day-row[data-day=“Monday”] td::before { background: var(–mon); }

.day-tag {
display: inline-block;
padding: 2px 8px;
border-radius: 3px;
font-size: 10px;
font-family: ‘DM Mono’, monospace;
font-weight: 500;
margin-left: 10px;
vertical-align: middle;
letter-spacing: 0.05em;
}

.day-row[data-day=“Thursday”] .day-tag { background: rgba(59,130,246,0.15); color: var(–thu); }
.day-row[data-day=“Friday”] .day-tag { background: rgba(236,72,153,0.15); color: var(–fri); }
.day-row[data-day=“Saturday”] .day-tag { background: rgba(249,115,22,0.15); color: var(–sat); }
.day-row[data-day=“Sunday”] .day-tag { background: rgba(167,139,250,0.15); color: var(–sun); }
.day-row[data-day=“Monday”] .day-tag { background: rgba(52,211,153,0.15); color: var(–mon); }

/* SESSION BADGE (morning/afternoon) */
.session-badge {
display: inline-block;
padding: 1px 6px;
border-radius: 3px;
font-size: 9px;
font-weight: 600;
letter-spacing: 0.08em;
text-transform: uppercase;
margin-right: 6px;
font-family: ‘DM Mono’, monospace;
}

.session-morning { background: rgba(245,200,66,0.12); color: #d4ac25; }
.session-afternoon { background: rgba(124,111,247,0.12); color: #9b8ef5; }

/* FILM ROW */
tr.film-row {
border-bottom: 1px solid rgba(42,47,62,0.5);
transition: background 0.1s;
}
tr.film-row:hover { background: rgba(255,255,255,0.02); }
tr.film-row.hidden { display: none; }

td {
padding: 9px 12px;
vertical-align: middle;
}

.film-name {
font-weight: 500;
color: #ffffff;
font-size: 12.5px;
line-height: 1.3;
}

.author-name {
color: #ffffff;
font-size: 13.5px;
}

.runtime {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: #ffffff;
text-align: center;
}

/* CHECKBOXES */
.check-cell {
text-align: center;
padding: 6px 4px;
}

.check-wrap {
display: inline-flex;
align-items: center;
justify-content: center;
width: 32px; height: 32px;
cursor: pointer;
border-radius: 6px;
transition: background 0.1s;
}
.check-wrap:hover { background: rgba(255,255,255,0.05); }
.check-wrap:active { transform: scale(0.92); }

.check-box {
width: 20px; height: 20px;
border-radius: 4px;
border: 1.5px solid var(–border);
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
background: var(–surface);
flex-shrink: 0;
}

/* State 1: want to see — yellow dash */
.check-box.state-1 {
background: #f5c842;
border-color: #f5c842;
}

/* State 2: approved — green checkmark */
.check-box.state-2 {
background: var(–check-on);
border-color: var(–check-on);
}

/* State 3: rejected — red X */
.check-box.state-3 {
background: #ef4444;
border-color: #ef4444;
}

.check-box .icon {
opacity: 0;
transform: scale(0.5);
transition: all 0.15s;
}
.check-box.state-1 .icon,
.check-box.state-2 .icon,
.check-box.state-3 .icon {
opacity: 1;
transform: scale(1);
}

/* PROGRESS */
.progress-row {
display: flex;
gap: 16px;
padding: 12px 20px;
border-bottom: 1px solid var(–border);
background: var(–surface);
flex-wrap: wrap;
}

.reviewer-progress {
display: flex;
flex-direction: column;
gap: 4px;
min-width: 100px;
}

.rp-header {
display: flex;
align-items: center;
gap: 6px;
font-size: 11px;
color: var(–text-dim);
font-weight: 500;
}

.rp-dot {
width: 8px; height: 8px;
border-radius: 50%;
flex-shrink: 0;
}

.rp-bar-bg {
height: 3px;
background: var(–border);
border-radius: 2px;
overflow: hidden;
}

.rp-bar-fill {
height: 100%;
border-radius: 2px;
transition: width 0.3s ease;
}

.rp-count {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–text-dimmer);
}

/* REVIEWER FILTER BUTTONS */
.progress-row {
align-items: flex-start;
}

.rev-filter-btn {
display: flex;
flex-direction: column;
gap: 4px;
min-width: 100px;
padding: 7px 10px;
background: transparent;
border: 1px solid var(–border);
border-radius: 6px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
color: var(–text-dim);
text-align: left;
transition: border-color 0.15s, background 0.15s;
}
.rev-filter-btn:hover {
border-color: var(–rc, #aaa);
background: rgba(255,255,255,0.03);
}
.rev-filter-btn.rev-active {
border-color: var(–rc, #aaa);
background: rgba(255,255,255,0.05);
color: #fff;
}
.rev-filter-btn[data-ri=“all”] {
min-width: 50px;
justify-content: center;
align-self: stretch;
font-size: 12px;
font-weight: 600;
letter-spacing: 0.05em;
text-transform: uppercase;
color: var(–text-dim);
align-items: center;
}
.rev-filter-btn[data-ri=“all”].rev-active {
border-color: #aaa;
color: #fff;
}
.rp-btn-inner {
display: flex;
align-items: center;
gap: 6px;
font-size: 11px;
font-weight: 500;
color: #ffffff;
}
.rp-btn-inner .rp-count {
margin-left: auto;
}

/* RESPONSIVE — Author & Runtime shrink/hide, Film Name & checkboxes always visible */
@media (max-width: 1100px) {
th.author-col, td:nth-child(2) { max-width: 90px; }
th.runtime-col, td:nth-child(3) { max-width: 60px; }
.author-name { font-size: 11px; }
.runtime { font-size: 10px; }
}

@media (max-width: 900px) {
th.runtime-col, td:nth-child(3) { display: none; }
th.author-col, td:nth-child(2) { max-width: 80px; }
.author-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; display: block; }
}

@media (max-width: 700px) {
th.author-col, td:nth-child(2) { display: none; }
th.film-col { min-width: 140px; }
.film-name { font-size: 11.5px; }
.reviewer-col, th.reviewer-col { min-width: 44px; width: 44px; }
.check-wrap { width: 28px; height: 28px; }
.check-box { width: 18px; height: 18px; }
.reviewer-initials { width: 24px; height: 24px; font-size: 9px; }
.reviewer-name-short { display: none; }
}

@media (max-width: 500px) {
.film-name { font-size: 11px; }
.session-badge { display: none; }
th.film-col { min-width: 110px; }
}

.desc-toggle-btn {
margin-left: auto;
padding: 5px 12px;
border-radius: 4px;
border: 1px solid var(–border);
background: transparent;
color: #ffffff;
font-size: 11px;
font-weight: 500;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.15s;
white-space: nowrap;
}
.desc-toggle-btn:hover { border-color: var(–accent); color: var(–accent); }
.desc-toggle-btn.active { border-color: var(–accent); color: var(–accent); background: rgba(245,200,66,0.08); }

tr.desc-row td {
padding: 0 12px 10px 12px;
font-size: 12px;
color: var(–text-dim);
font-style: italic;
line-height: 1.5;
border-bottom: 1px solid rgba(42,47,62,0.5);
}
tr.desc-row.hidden { display: none; }
tr.desc-row td span {
display: block;
padding: 6px 10px;
background: rgba(255,255,255,0.03);
border-left: 2px solid var(–border);
border-radius: 0 4px 4px 0;
}

/* NO RESULTS */
.no-results {
text-align: center;
padding: 40px;
color: var(–text-dimmer);
font-style: italic;
display: none;
}
.no-results.visible { display: block; }

</style>

</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-title">Spring Screenings 2026</div>
    <div id="current-day-indicator" style="font-size:14px;font-family:'DM Serif Display',serif;font-weight:400;color:#ffffff;padding:2px 12px;border-radius:4px;display:none;"></div>
    <div id="sync-status" style="font-size:11px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);color:#7a8099;">⏳ connecting…</div>

  </div>
</header>

<div class="filters-bar">
  <span class="filter-label">Filter:</span>
  <input class="search-input" type="search" placeholder="Search film or author…" id="search-input">
  <div class="day-filters">
    <button class="day-btn active" data-day="All">All Days</button>
    <button class="day-btn" data-day="Thursday">Thu</button>
    <button class="day-btn" data-day="Friday">Fri</button>
    <button class="day-btn" data-day="Saturday">Sat</button>
    <button class="day-btn" data-day="Sunday">Sun</button>
    <button class="day-btn" data-day="Monday">Mon</button>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px;"><span style="font-family:'DM Mono',monospace;font-size:11px;color:#ffffff;"><strong id="total-films" style="color:#f5c842;font-size:13px;">0</strong> films</span><button class="clear-btn" id="clear-btn">Clear All Checks</button></div>
</div>

<div class="filters-bar" id="filters-bar-2" style="padding-top:8px;padding-bottom:8px;gap:10px;flex-wrap:wrap;">
  <span class="filter-label">Show:</span>
  <div class="day-filters" id="state-filters">
    <button class="state-btn active" data-state="all">All</button>
    <button class="state-btn" data-state="0">Unreviewed</button>
    <button class="state-btn" data-state="1">— Want to See</button>
    <button class="state-btn" data-state="2">✓ Approved</button>
    <button class="state-btn" data-state="3">✗ Rejected</button>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;"><button class="desc-toggle-btn" id="reviewers-toggle-btn">Hide Reviewer Names</button><button class="desc-toggle-btn" id="desc-toggle-btn">📋 Show Descriptions</button><button class="desc-toggle-btn" id="txt-btn" style="border-color:#14b8a6;color:#14b8a6;">TXT</button></div>
</div>

<div class="progress-row" id="progress-row"></div>

<div class="table-wrapper">
  <table id="main-table">
    <thead>
      <tr>
        <th class="film-col">Film Name</th>
        <th class="author-col">Author</th>
        <th class="runtime-col">Runtime</th>
        <th class="reviewer-col" data-reviewer="Linda Moroney" data-ri-col="0">
          <div class="reviewer-header">
            <div class="reviewer-initials" style="background:rgba(239,68,68,0.15);color:#ef4444;">LM</div>
            <div class="reviewer-name-short">Linda</div>
          </div>
        </th>
        <th class="reviewer-col" data-reviewer="Vanessa Sweet" data-ri-col="1">
          <div class="reviewer-header">
            <div class="reviewer-initials" style="background:rgba(168,85,247,0.15);color:#a855f7;">VS</div>
            <div class="reviewer-name-short">Vanessa</div>
          </div>
        </th>
        <th class="reviewer-col" data-reviewer="Jonathan Seligson" data-ri-col="2">
          <div class="reviewer-header">
            <div class="reviewer-initials" style="background:rgba(59,130,246,0.15);color:#3b82f6;">JS</div>
            <div class="reviewer-name-short">Jonathan</div>
          </div>
        </th>
        <th class="reviewer-col" data-reviewer="Daniel LaTourette" data-ri-col="3">
          <div class="reviewer-header">
            <div class="reviewer-initials" style="background:rgba(20,184,166,0.15);color:#14b8a6;">DL</div>
            <div class="reviewer-name-short">Daniel</div>
          </div>
        </th>
        <th class="reviewer-col" data-reviewer="Andrew Sevigny" data-ri-col="4">
          <div class="reviewer-header">
            <div class="reviewer-initials" style="background:rgba(249,115,22,0.15);color:#f97316;">AS</div>

            <div class="reviewer-name-short">Mark</div>
          </div>
        </th>
      </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
  </table>
  <div class="no-results" id="no-results">No films match your search.</div>
</div>

<div id="txt-modal" style="display:none;position:fixed;inset:0;z-index:999;background:#0d0f14;align-items:stretch;justify-content:stretch;">
  <div style="background:#1e2230;border:1px solid #14b8a6;flex:1;display:flex;flex-direction:column;overflow:hidden;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #2a2f3e;">
      <span style="font-family:'DM Sans',sans-serif;font-weight:600;color:#ffffff;font-size:14px;">📄 Text Export</span>
      <div style="display:flex;gap:8px;">
        <button onclick="copyTxt()" style="padding:5px 14px;border-radius:4px;border:1px solid #4ade80;background:transparent;color:#4ade80;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;font-weight:600;">Copy All</button>
        <button onclick="closeTxtModal()" style="padding:5px 14px;border-radius:4px;border:1px solid #2a2f3e;background:transparent;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;">Close</button>
      </div>
    </div>
    <textarea id="txt-output" readonly style="flex:1;background:#0d0f14;color:#e8eaf0;font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;padding:16px 18px;border:none;outline:none;resize:none;overflow-y:auto;white-space:pre;"></textarea>
  </div>
</div>

// State
let checks = {};
let activeDay = ‘All’;
let searchQuery = ‘’;
let activeReviewer = null;
let activeState = ‘all’;
let showDescriptions = false;

function storageKey(filmIdx, reviewerIdx) {
return `ss26_${filmIdx}_${reviewerIdx}`;
}

function loadChecks() {
// Seed from localStorage immediately for instant display
checks = {};
FILMS.forEach((*, fi) => {
REVIEWERS.forEach((*, ri) => {
const k = storageKey(fi, ri);
const v = parseInt(localStorage.getItem(k) || ‘0’, 10);
checks[k] = isNaN(v) ? 0 : v;
});
});
}

function setSyncStatus(state) {
const el = document.getElementById(‘sync-status’);
if (!el) return;
if (state === ‘connected’)  { el.textContent = ‘🟢 synced’;        el.style.color = ‘#4ade80’; }
else if (state === ‘error’) { el.textContent = ‘🔴 sync error’;     el.style.color = ‘#f87171’; }
else                        { el.textContent = ‘⏳ connecting…’;    el.style.color = ‘#7a8099’; }
}

function startFirebaseSync() {
window._fbListen(data => {
setSyncStatus(‘connected’);
// Restore scroll once on first sync
if (!window.*scrollRestored) {
window.*scrollRestored = true;
const savedScroll = parseInt(localStorage.getItem(‘pref_scroll’) || ‘0’, 10);
if (savedScroll > 0) {
setTimeout(() => {
window.scrollTo({ top: savedScroll, behavior: ‘instant’ });
updateDayIndicator();
}, 50);
}
}
// Merge incoming data into checks
FILMS.forEach((*, fi) => {
REVIEWERS.forEach((*, ri) => {
const k = storageKey(fi, ri);
const v = parseInt((data[k] !== undefined ? data[k] : 0), 10);
checks[k] = isNaN(v) ? 0 : v;
// Update DOM to match
const wrap = document.querySelector(`[data-fi="${fi}"][data-ri="${ri}"]`);
if (wrap) {
const box = wrap.querySelector(’.check-box’);
box.classList.remove(‘state-1’, ‘state-2’, ‘state-3’);
if (checks[k] > 0) box.classList.add(‘state-’ + checks[k]);
wrap.querySelector(’.dash-icon’).style.display  = checks[k] === 1 ? ‘block’ : ‘none’;
wrap.querySelector(’.check-icon’).style.display = checks[k] === 2 ? ‘block’ : ‘none’;
wrap.querySelector(’.x-icon’).style.display     = checks[k] === 3 ? ‘block’ : ‘none’;
}
});
});
updateStats();
});
}

function saveCheck(filmIdx, reviewerIdx, val) {
const k = storageKey(filmIdx, reviewerIdx);
checks[k] = val;
localStorage.setItem(k, String(val));   // instant local cache
if (window._fbReady) {
window._fbSet(k, val).catch(err => {
console.error(‘Firebase write error:’, err);
setSyncStatus(‘error’);
});
}
}

function toggle(filmIdx, reviewerIdx) {
const cur = checks[storageKey(filmIdx, reviewerIdx)] || 0;
const newVal = (cur + 1) % 4;
saveCheck(filmIdx, reviewerIdx, newVal);
const wrap = document.querySelector(`[data-fi="${filmIdx}"][data-ri="${reviewerIdx}"]`);
if (wrap) {
const box = wrap.querySelector(’.check-box’);
box.classList.remove(‘state-1’, ‘state-2’, ‘state-3’);
if (newVal > 0) box.classList.add(‘state-’ + newVal);
wrap.querySelector(’.dash-icon’).style.display  = newVal === 1 ? ‘block’ : ‘none’;
wrap.querySelector(’.check-icon’).style.display = newVal === 2 ? ‘block’ : ‘none’;
wrap.querySelector(’.x-icon’).style.display     = newVal === 3 ? ‘block’ : ‘none’;
}
updateStats();
}

function escHtml(s) {
return s.replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’);
}

function filterByState() {
document.querySelectorAll(‘tr.film-row:not(.hidden)’).forEach(row => {
if (activeState === ‘all’) { row.classList.remove(‘hidden’); return; }
const fi = parseInt(row.dataset.fi);
const stateNum = parseInt(activeState);
let match = false;
if (activeReviewer === null) {
if (stateNum === 0) {
// Unreviewed: ALL reviewers must be blank
match = REVIEWERS.every((*, ri) => (checks[storageKey(fi, ri)] || 0) === 0);
} else {
// Any reviewer has this state
match = REVIEWERS.some((*, ri) => (checks[storageKey(fi, ri)] || 0) === stateNum);
}
} else {
match = (checks[storageKey(fi, activeReviewer)] || 0) === stateNum;
}
row.classList.toggle(‘hidden’, !match);
});
// sync desc rows visibility with their film row
syncDescRows();
}

function syncDescRows() {
document.querySelectorAll(‘tr.desc-row’).forEach(dr => {
const fi = dr.dataset.fi;
const filmRow = document.querySelector(`tr.film-row[data-fi="${fi}"]`);
const hidden = !filmRow || filmRow.classList.contains(‘hidden’);
dr.classList.toggle(‘hidden’, hidden || !showDescriptions);
});
// hide day headers if no visible films
const visibleDays = new Set();
document.querySelectorAll(‘tr.film-row:not(.hidden)’).forEach(r => visibleDays.add(r.dataset.day));
document.querySelectorAll(‘tr.day-row’).forEach(r => {
r.classList.toggle(‘hidden’, !visibleDays.has(r.dataset.day));
});
const noResults = document.getElementById(‘no-results’);
if (noResults) noResults.classList.toggle(‘visible’, visibleDays.size === 0);
}

function toggleDescriptions() {
showDescriptions = !showDescriptions;
localStorage.setItem(‘pref_desc’, showDescriptions ? ‘1’ : ‘0’);
const btn = document.getElementById(‘desc-toggle-btn’);
btn.classList.toggle(‘active’, showDescriptions);
btn.textContent = showDescriptions ? ‘📋 Hide Descriptions’ : ‘📋 Show Descriptions’;
syncDescRows();
}

function filterRows() {
const rows = document.querySelectorAll(‘tr.film-row, tr.day-row’);
const dayRows = document.querySelectorAll(‘tr.day-row’);
const query = searchQuery.trim().toLowerCase();

// Track which days have visible films
const visibleDays = new Set();

document.querySelectorAll(‘tr.film-row’).forEach(row => {
const rowDay = row.dataset.day;
const rowSearch = row.dataset.search;
const dayMatch = activeDay === ‘All’ || rowDay === activeDay;
const searchMatch = !query || rowSearch.includes(query);
const visible = dayMatch && searchMatch;
row.classList.toggle(‘hidden’, !visible);
if (visible) visibleDays.add(rowDay);
});

// Hide day headers with no visible films
dayRows.forEach(row => {
const rowDay = row.dataset.day;
row.classList.toggle(‘hidden’, !visibleDays.has(rowDay));
});

const noResults = document.getElementById(‘no-results’);
noResults.classList.toggle(‘visible’, visibleDays.size === 0);
if (activeState !== ‘all’) filterByState();
syncDescRows();
}

function filterReviewerCols() {
const allCols = document.querySelectorAll(’[data-ri-col]’);
allCols.forEach(el => {
if (activeReviewer === null) {
el.style.display = ‘’;
} else {
el.style.display = (el.dataset.riCol === String(activeReviewer)) ? ‘’ : ‘none’;
}
});
updateProgress();
}

function updateStats() {
let total = 0;
FILMS.forEach((_, fi) => {
REVIEWERS.forEach((r, ri) => {
if (checks[storageKey(fi, ri)] > 0) total++;
});
});
document.getElementById(‘total-films’).textContent = FILMS.length;
updateProgress();
}

function updateProgress() {
const row = document.getElementById(‘progress-row’);
const allActive = activeReviewer === null;
let html = `<button class="rev-filter-btn${allActive ? ' rev-active' : ''}" data-ri="all" style="--rc:#aaa" onclick="activeReviewer=null;localStorage.setItem('pref_reviewer','all');filterReviewerCols();">All</button>`;
html += REVIEWERS.map((r, ri) => {
let count = 0;
FILMS.forEach((_, fi) => { if (checks[storageKey(fi, ri)] > 0) count++; });
const pct = Math.round((count / FILMS.length) * 100);
const isActive = activeReviewer === ri;
return `<button class="rev-filter-btn${isActive ? ' rev-active' : ''}" data-ri="${ri}" style="--rc:${r.color}" onclick="activeReviewer=${ri};localStorage.setItem('pref_reviewer',String(${ri}));filterReviewerCols();"> <div class="rp-btn-inner"> <div class="rp-dot" style="background:${r.color}"></div> <span>${r.name}</span> <span class="rp-count">${count}/${FILMS.length}</span> </div> <div class="rp-bar-bg"><div class="rp-bar-fill" style="width:${pct}%;background:${r.color}"></div></div> </button>`;
}).join(’’);
row.innerHTML = html;
}

// Day filter buttons
document.querySelectorAll(’.day-btn’).forEach(btn => {
btn.addEventListener(‘click’, () => {
document.querySelectorAll(’.day-btn’).forEach(b => b.classList.remove(‘active’));
btn.classList.add(‘active’);
activeDay = btn.dataset.day;
localStorage.setItem(‘pref_day’, activeDay);
filterRows();
});
});

// State filter buttons
document.querySelectorAll(’#state-filters .state-btn’).forEach(btn => {
btn.addEventListener(‘click’, () => {
document.querySelectorAll(’#state-filters .state-btn’).forEach(b => b.classList.remove(‘active’));
btn.classList.add(‘active’);
activeState = btn.dataset.state;
localStorage.setItem(‘pref_state’, activeState);
filterRows();
});
});

// Description toggle
document.getElementById(‘desc-toggle-btn’).addEventListener(‘click’, toggleDescriptions);

// Search
document.getElementById(‘search-input’).addEventListener(‘input’, e => {
searchQuery = e.target.value;
filterRows();
});

// Clear all
document.getElementById(‘clear-btn’).addEventListener(‘click’, () => {
if (!confirm(‘Clear all checkmarks? This cannot be undone.’)) return;
FILMS.forEach((_, fi) => {
REVIEWERS.forEach((r, ri) => {
saveCheck(fi, ri, 0);
const wrap = document.querySelector(`[data-fi="${fi}"][data-ri="${ri}"]`);
if (wrap) {
const box = wrap.querySelector(’.check-box’);
box.classList.remove(‘state-1’, ‘state-2’);
wrap.querySelector(’.dash-icon’).style.display  = ‘none’;
wrap.querySelector(’.check-icon’).style.display = ‘none’;
wrap.querySelector(’.x-icon’).style.display     = ‘none’;
}
});
});
updateStats();
});

// ── Reviewer names toggle ─────────────────────────────────────────────────────
let showReviewerNames = localStorage.getItem(‘pref_reviewer_names’) !== ‘0’;

function applyReviewerNames() {
const btn = document.getElementById(‘reviewers-toggle-btn’);
const bar = document.getElementById(‘progress-row’);
if (bar) bar.style.display = showReviewerNames ? ‘’ : ‘none’;
if (btn) {
btn.textContent = showReviewerNames ? ‘Hide Reviewer Names’ : ‘Show Reviewer Names’;
btn.classList.toggle(‘active’, !showReviewerNames);
}
}

document.getElementById(‘reviewers-toggle-btn’).addEventListener(‘click’, () => {
showReviewerNames = !showReviewerNames;
localStorage.setItem(‘pref_reviewer_names’, showReviewerNames ? ‘1’ : ‘0’);
applyReviewerNames();
});

// Init — wait for Firebase module to be ready, then sync
function init() {
// Restore saved preferences
const savedDay = localStorage.getItem(‘pref_day’);
if (savedDay) {
activeDay = savedDay;
}
const savedReviewer = localStorage.getItem(‘pref_reviewer’);
if (savedReviewer !== null) {
activeReviewer = savedReviewer === ‘all’ ? null : parseInt(savedReviewer, 10);
}
const savedState = localStorage.getItem(‘pref_state’);
if (savedState) {
activeState = savedState;
const stateBtn = document.querySelector(`#state-filters [data-state="${savedState}"]`);
if (stateBtn) {
document.querySelectorAll(’#state-filters .state-btn’).forEach(b => b.classList.remove(‘active’));
stateBtn.classList.add(‘active’);
}
}
const savedDesc = localStorage.getItem(‘pref_desc’);
if (savedDesc === ‘1’) {
showDescriptions = true;
}

loadChecks();
buildTable();

applyReviewerNames();
// Sync desc toggle button
const descBtn = document.getElementById(‘desc-toggle-btn’);
if (descBtn && showDescriptions) {
descBtn.classList.add(‘active’);
descBtn.textContent = ‘📋 Hide Descriptions’;
}
// Sync day button highlight to restored preference
document.querySelectorAll(’.day-btn’).forEach(b => {
b.classList.toggle(‘active’, b.dataset.day === activeDay);
});

filterRows();
updateStats();
if (window._fbReady) {
startFirebaseSync();
} else {
window.addEventListener(‘firebase-ready’, startFirebaseSync);
}
}
init();

// ── Sticky offset calculator ──────────────────────────────────────────────────
function fixStickyOffsets() {
const h0 = (document.querySelector(’.site-header’) || {offsetHeight:0}).offsetHeight;
const h1 = (document.querySelector(’.filters-bar’) || {offsetHeight:0}).offsetHeight;
const h2 = (document.querySelector(’.progress-row’) || {offsetHeight:0}).offsetHeight;
const fb = document.querySelector(’.filters-bar’);
const pr = document.querySelector(’.progress-row’);
const th = document.querySelector(‘thead’);
if (fb) fb.style.top  = h0 + ‘px’;
if (pr) pr.style.top  = (h0 + h1) + ‘px’;
if (th) th.style.top  = h0 + ‘px’;
}
fixStickyOffsets();
window.addEventListener(‘resize’, fixStickyOffsets);

// ── Day indicator + scroll save ───────────────────────────────────────────────
function updateDayIndicator() {
const indicator = document.getElementById(‘current-day-indicator’);
if (!indicator) return;
const dayRows = document.querySelectorAll(‘tr.day-row:not(.hidden)’);
const threshold = 120; // px from top - below site header + column header
let currentDay = null;
dayRows.forEach(row => {
const rect = row.getBoundingClientRect();
if (rect.top <= threshold) currentDay = row.dataset.day;
});
const colors = {Thursday:’#3b82f6’,Friday:’#ec4899’,Saturday:’#f97316’,Sunday:’#a78bfa’,Monday:’#34d399’};
if (currentDay) {
indicator.textContent = currentDay;
indicator.style.display = ‘block’;
indicator.style.color = colors[currentDay] || ‘#ffffff’;
indicator.style.background = (colors[currentDay] || ‘#ffffff’) + ‘22’;
indicator.style.borderLeft = ’3px solid ’ + (colors[currentDay] || ‘#ffffff’);
} else {
indicator.style.display = ‘none’;
}
}

window.addEventListener(‘scroll’, () => {
localStorage.setItem(‘pref_scroll’, window.scrollY);
updateDayIndicator();
});
updateDayIndicator();

// ── TXT Export ────────────────────────────────────────────────────────────────
const STATE_LABELS = { 0: ‘[ ]’, 1: ‘[-]’, 2: ‘[✓]’, 3: ‘[✗]’ };

function generateTxt() {
const visibleFilmRows = Array.from(document.querySelectorAll(‘tr.film-row:not(.hidden)’));
if (!visibleFilmRows.length) return ‘(no films match current filter)’;

let currentDay = null;
let lines = [];

visibleFilmRows.forEach(row => {
const fi = parseInt(row.dataset.fi);
const film = FILMS[fi];

```
if (film.day !== currentDay) {
  currentDay = film.day;
  if (lines.length > 0) lines.push('');
  lines.push('── ' + currentDay + ' ──────────────────────────────');
  lines.push('');
}

lines.push(film.title);
lines.push('  ' + film.author + '  |  ' + film.runtime);
lines.push('');
```

});

return lines.join(’\n’).trim();
}

function openTxtModal() {
const modal = document.getElementById(‘txt-modal’);
modal.style.display = ‘flex’;
document.getElementById(‘txt-output’).value = generateTxt();
}

function closeTxtModal() {
document.getElementById(‘txt-modal’).style.display = ‘none’;
}

function copyTxt() {
const ta = document.getElementById(‘txt-output’);
ta.select();
navigator.clipboard.writeText(ta.value).catch(() => document.execCommand(‘copy’));
const btn = event.target;
btn.textContent = ‘Copied!’;
setTimeout(() => btn.textContent = ‘Copy All’, 1500);
}

document.getElementById(‘txt-btn’).addEventListener(‘click’, openTxtModal);

// Close modal on backdrop click
document.getElementById(‘txt-modal’).addEventListener(‘click’, e => {
if (e.target === document.getElementById(‘txt-modal’)) closeTxtModal();
});
</script>
