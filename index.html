<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Screenings 2026 — Review Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --text-dimmer: #454d66;
    --accent: #f5c842;
    --accent2: #e07b3f;
    --morning: #f5c842;
    --afternoon: #7c6ff7;
    --check-on: #4ade80;
    --thu: #3b82f6;
    --fri: #ec4899;
    --sat: #f97316;
    --sun: #a78bfa;
    --mon: #34d399;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    line-height: 1.4;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }

  .header-inner {
    max-width: 100%;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 56px;
  }

  .site-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--accent);
    white-space: nowrap;
    letter-spacing: -0.3px;
  }

  .site-title span {
    color: var(--text-dim);
    font-style: italic;
    font-size: 14px;
    margin-left: 6px;
  }

  .header-stats {
    display: flex;
    gap: 16px;
    margin-left: auto;
    align-items: center;
  }

  .stat {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .stat strong {
    color: var(--accent);
    font-size: 13px;
  }

  /* FILTERS */
  .filters-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  .search-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dimmer); }

  .day-filters {
    display: flex;
    gap: 6px;
  }

  .day-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.03em;
  }
  .day-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .day-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .day-btn[data-day="Thursday"].active { background: var(--thu); border-color: var(--thu); }
  .day-btn[data-day="Friday"].active { background: var(--fri); border-color: var(--fri); color: #fff; }
  .day-btn[data-day="Saturday"].active { background: var(--sat); border-color: var(--sat); }
  .day-btn[data-day="Sunday"].active { background: var(--sun); border-color: var(--sun); color: #fff; }
  .day-btn[data-day="Monday"].active { background: var(--mon); border-color: var(--mon); color: #000; }

  .clear-btn {
    margin-left: auto;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid #3d2020;
    background: transparent;
    color: #e05050;
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .clear-btn:hover { background: #3d2020; }

  /* TABLE WRAPPER */
  .table-wrapper {
    overflow-x: visible;
    padding: 0;
  }

  body {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 0;
  }

  /* STICKY HEADER */
  thead {
    position: sticky;
    top: 56px;
    z-index: 90;
  }

  thead tr:first-child th {
    background: var(--surface2);
    border-bottom: 2px solid var(--border);
    padding: 10px 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }

  th.film-col { text-align: left; width: 34%; min-width: 260px; }
  th.author-col { text-align: left; width: 14%; min-width: 120px; }
  th.runtime-col { text-align: center; width: 7%; min-width: 70px; }
  th.reviewer-col { text-align: center; width: 9%; min-width: 80px; }

  .reviewer-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    user-select: none;
  }

  .reviewer-initials {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0;
    font-family: 'DM Mono', monospace;
  }

  .reviewer-name-short {
    font-size: 9px;
    color: var(--text-dimmer);
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  /* DAY SECTION HEADER */
  tr.day-row.hidden { display: none; }

  .day-row td {
    padding: 18px 16px 12px;
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: #ffffff;
    border-top: 3px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: #252a3a;
    position: relative;
    letter-spacing: -0.2px;
  }



  .day-row td::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .day-row[data-day="Thursday"] td::before { background: var(--thu); }
  .day-row[data-day="Friday"] td::before { background: var(--fri); }
  .day-row[data-day="Saturday"] td::before { background: var(--sat); }
  .day-row[data-day="Sunday"] td::before { background: var(--sun); }
  .day-row[data-day="Monday"] td::before { background: var(--mon); }

  .day-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    margin-left: 10px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }

  .day-row[data-day="Thursday"] .day-tag { background: rgba(59,130,246,0.15); color: var(--thu); }
  .day-row[data-day="Friday"] .day-tag { background: rgba(236,72,153,0.15); color: var(--fri); }
  .day-row[data-day="Saturday"] .day-tag { background: rgba(249,115,22,0.15); color: var(--sat); }
  .day-row[data-day="Sunday"] .day-tag { background: rgba(167,139,250,0.15); color: var(--sun); }
  .day-row[data-day="Monday"] .day-tag { background: rgba(52,211,153,0.15); color: var(--mon); }

  /* SESSION BADGE (morning/afternoon) */
  .session-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 6px;
    font-family: 'DM Mono', monospace;
  }

  .session-morning { background: rgba(245,200,66,0.12); color: #d4ac25; }
  .session-afternoon { background: rgba(124,111,247,0.12); color: #9b8ef5; }

  /* FILM ROW */
  tr.film-row {
    border-bottom: 1px solid rgba(42,47,62,0.5);
    transition: background 0.1s;
  }
  tr.film-row:hover { background: rgba(255,255,255,0.02); }
  tr.film-row.hidden { display: none; }

  td {
    padding: 9px 12px;
    vertical-align: middle;
  }

  .film-name {
    font-weight: 500;
    color: var(--text);
    font-size: 12.5px;
    line-height: 1.3;
  }

  .author-name {
    color: var(--text-dim);
    font-size: 12px;
  }

  .runtime {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dimmer);
    text-align: center;
  }

  /* CHECKBOXES */
  .check-cell {
    text-align: center;
    padding: 6px 4px;
  }

  .check-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.1s;
  }
  .check-wrap:hover { background: rgba(255,255,255,0.05); }
  .check-wrap:active { transform: scale(0.92); }

  .check-box {
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--surface);
    flex-shrink: 0;
  }

  /* State 1: want to see — yellow dash */
  .check-box.state-1 {
    background: #f5c842;
    border-color: #f5c842;
  }

  /* State 2: approved — green checkmark */
  .check-box.state-2 {
    background: var(--check-on);
    border-color: var(--check-on);
  }

  .check-box .icon {
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.15s;
  }
  .check-box.state-1 .icon,
  .check-box.state-2 .icon {
    opacity: 1;
    transform: scale(1);
  }

  /* PROGRESS */
  .progress-row {
    display: flex;
    gap: 16px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }

  .reviewer-progress {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 100px;
  }

  .rp-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .rp-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .rp-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .rp-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .rp-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dimmer);
  }


  /* REVIEWER FILTER BUTTONS */
  .progress-row {
    align-items: flex-start;
  }

  .rev-filter-btn {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 100px;
    padding: 7px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dim);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .rev-filter-btn:hover {
    border-color: var(--rc, #aaa);
    background: rgba(255,255,255,0.03);
  }
  .rev-filter-btn.rev-active {
    border-color: var(--rc, #aaa);
    background: rgba(255,255,255,0.05);
    color: #fff;
  }
  .rev-filter-btn[data-ri="all"] {
    min-width: 50px;
    justify-content: center;
    align-self: stretch;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-dim);
    align-items: center;
  }
  .rev-filter-btn[data-ri="all"].rev-active {
    border-color: #aaa;
    color: #fff;
  }
  .rp-btn-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
  }
  .rp-btn-inner .rp-count {
    margin-left: auto;
  }


  /* RESPONSIVE — Author & Runtime shrink/hide, Film Name & checkboxes always visible */
  @media (max-width: 1100px) {
    th.author-col, td:nth-child(2) { max-width: 90px; }
    th.runtime-col, td:nth-child(3) { max-width: 60px; }
    .author-name { font-size: 11px; }
    .runtime { font-size: 10px; }
  }

  @media (max-width: 900px) {
    th.runtime-col, td:nth-child(3) { display: none; }
    th.author-col, td:nth-child(2) { max-width: 80px; }
    .author-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; display: block; }
  }

  @media (max-width: 700px) {
    th.author-col, td:nth-child(2) { display: none; }
    th.film-col { min-width: 140px; }
    .film-name { font-size: 11.5px; }
    .reviewer-col, th.reviewer-col { min-width: 44px; width: 44px; }
    .check-wrap { width: 28px; height: 28px; }
    .check-box { width: 18px; height: 18px; }
    .reviewer-initials { width: 24px; height: 24px; font-size: 9px; }
    .reviewer-name-short { display: none; }
  }

  @media (max-width: 500px) {
    .film-name { font-size: 11px; }
    .session-badge { display: none; }
    th.film-col { min-width: 110px; }
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--text-dimmer);
    font-style: italic;
    display: none;
  }
  .no-results.visible { display: block; }

</style>
</head>

// State
let checks = {};
let activeDay = 'All';
let searchQuery = '';
let activeReviewer = null;

function storageKey(filmIdx, reviewerIdx) {
  return `ss26_${filmIdx}_${reviewerIdx}`;
}

function loadChecks() {
  checks = {};
  FILMS.forEach((_, fi) => {
    REVIEWERS.forEach((_, ri) => {
      const k = storageKey(fi, ri);
      const v = parseInt(localStorage.getItem(k) || '0', 10);
      checks[k] = isNaN(v) ? 0 : v;
    });
  });
}

function saveCheck(filmIdx, reviewerIdx, val) {
  const k = storageKey(filmIdx, reviewerIdx);
  checks[k] = val;
  localStorage.setItem(k, String(val));
}

function toggle(filmIdx, reviewerIdx) {
  const cur = checks[storageKey(filmIdx, reviewerIdx)] || 0;
  const newVal = (cur + 1) % 3;
  saveCheck(filmIdx, reviewerIdx, newVal);
  const wrap = document.querySelector(`[data-fi="${filmIdx}"][data-ri="${reviewerIdx}"]`);
  if (wrap) {
    const box = wrap.querySelector('.check-box');
    box.classList.remove('state-1', 'state-2');
    if (newVal > 0) box.classList.add('state-' + newVal);
    wrap.querySelector('.dash-icon').style.display  = newVal === 1 ? 'block' : 'none';
    wrap.querySelector('.check-icon').style.display = newVal === 2 ? 'block' : 'none';
  }
  updateStats();
}

function buildTable() {
  const tbody = document.getElementById('table-body');
  let currentDay = null;
  let html = '';

  FILMS.forEach((film, fi) => {
    if (film.day !== currentDay) {
      currentDay = film.day;
      const dayColors = {Thursday:'#3b82f6',Friday:'#ec4899',Saturday:'#f97316',Sunday:'#a78bfa',Monday:'#34d399'};
      const dc = dayColors[film.day] || '#ffffff';
      html += `<tr class="day-row" data-day="${film.day}">
        <td colspan="9" style="padding:20px 20px 16px;font-family:'DM Serif Display',serif;font-size:26px;color:#ffffff;background:#1a1f2e;border-top:4px solid ${dc};border-bottom:2px solid #2a2f3e;position:relative;line-height:1.2;">
          <span style="border-left:4px solid ${dc};padding-left:14px;color:#ffffff;display:inline-block;">${film.day}</span>
        </td>
      </tr>`;
    }

    const sessionClass = film.session === 'morning' ? 'session-morning' : 'session-afternoon';
    const sessionLabel = film.session === 'morning' ? '☀ Morning' : '🌙 Afternoon';

    let checkCells = '';
    REVIEWERS.forEach((r, ri) => {
      const isChecked = checks[storageKey(fi, ri)];
      const state = checks[storageKey(fi, ri)] || 0;
      const stateClass = state === 1 ? ' state-1' : state === 2 ? ' state-2' : '';
      checkCells += `
        <td class="check-cell" data-ri-col="${ri}">
          <div class="check-wrap" data-fi="${fi}" data-ri="${ri}" onclick="toggle(${fi},${ri})">
            <div class="check-box${stateClass}">
              <svg class="icon dash-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" style="display:${state===1?'block':'none'}">
                <path d="M2.5 6h7" stroke="#000" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <svg class="icon check-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" style="display:${state===2?'block':'none'}">
                <path d="M2 6l3 3 5-5" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </td>`;
    });

    html += `<tr class="film-row" data-day="${film.day}" data-search="${film.title.toLowerCase()} ${film.author.toLowerCase()}">
      <td><span class="session-badge ${sessionClass}">${sessionLabel}</span><span class="film-name">${escHtml(film.title)}</span></td>
      <td><span class="author-name">${escHtml(film.author)}</span></td>
      <td><span class="runtime">${film.runtime}</span></td>
      ${checkCells}
    </tr>`;
  });

  tbody.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function filterRows() {
  const rows = document.querySelectorAll('tr.film-row, tr.day-row');
  const dayRows = document.querySelectorAll('tr.day-row');
  const query = searchQuery.trim().toLowerCase();

  // Track which days have visible films
  const visibleDays = new Set();

  document.querySelectorAll('tr.film-row').forEach(row => {
    const rowDay = row.dataset.day;
    const rowSearch = row.dataset.search;
    const dayMatch = activeDay === 'All' || rowDay === activeDay;
    const searchMatch = !query || rowSearch.includes(query);
    const visible = dayMatch && searchMatch;
    row.classList.toggle('hidden', !visible);
    if (visible) visibleDays.add(rowDay);
  });

  // Hide day headers with no visible films
  dayRows.forEach(row => {
    const rowDay = row.dataset.day;
    row.classList.toggle('hidden', !visibleDays.has(rowDay));
  });

  const noResults = document.getElementById('no-results');
  noResults.classList.toggle('visible', visibleDays.size === 0);
}

function filterReviewerCols() {
  const allCols = document.querySelectorAll('[data-ri-col]');
  allCols.forEach(el => {
    if (activeReviewer === null) {
      el.style.display = '';
    } else {
      el.style.display = (el.dataset.riCol === String(activeReviewer)) ? '' : 'none';
    }
  });
  updateProgress();
}

function updateStats() {
  let total = 0;
  FILMS.forEach((_, fi) => {
    REVIEWERS.forEach((r, ri) => {
      if (checks[storageKey(fi, ri)] > 0) total++;
    });
  });
  document.getElementById('total-films').textContent = FILMS.length;
  document.getElementById('total-checks').textContent = total;
  updateProgress();
}

function updateProgress() {
  const row = document.getElementById('progress-row');
  const allActive = activeReviewer === null;
  let html = `<button class="rev-filter-btn${allActive ? ' rev-active' : ''}" data-ri="all"
    style="--rc:#aaa" onclick="activeReviewer=null;filterReviewerCols();">All</button>`;
  html += REVIEWERS.map((r, ri) => {
    let count = 0;
    FILMS.forEach((_, fi) => { if (checks[storageKey(fi, ri)] > 0) count++; });
    const pct = Math.round((count / FILMS.length) * 100);
    const isActive = activeReviewer === ri;
    return `<button class="rev-filter-btn${isActive ? ' rev-active' : ''}" data-ri="${ri}"
      style="--rc:${r.color}" onclick="activeReviewer=${ri};filterReviewerCols();">
      <div class="rp-btn-inner">
        <div class="rp-dot" style="background:${r.color}"></div>
        <span>${r.name}</span>
        <span class="rp-count">${count}/${FILMS.length}</span>
      </div>
      <div class="rp-bar-bg"><div class="rp-bar-fill" style="width:${pct}%;background:${r.color}"></div></div>
    </button>`;
  }).join('');
  row.innerHTML = html;
}

// Day filter buttons
document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeDay = btn.dataset.day;
    filterRows();
  });
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  filterRows();
});

// Clear all
document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('Clear all checkmarks? This cannot be undone.')) return;
  FILMS.forEach((_, fi) => {
    REVIEWERS.forEach((r, ri) => {
      saveCheck(fi, ri, 0);
      const wrap = document.querySelector(`[data-fi="${fi}"][data-ri="${ri}"]`);
      if (wrap) {
        const box = wrap.querySelector('.check-box');
        box.classList.remove('state-1', 'state-2');
        wrap.querySelector('.dash-icon').style.display  = 'none';
        wrap.querySelector('.check-icon').style.display = 'none';
      }
    });
  });
  updateStats();
});

// Init
loadChecks();
buildTable();
filterRows();
updateStats();
</script>
</body>
</html>
